# Single-VPS deployment for Leksis.
# One host runs five containers on a private network: Caddy (the only one
# exposed to the internet), the static web app, the Hono API, the bot-only
# AT Proto PDS, and ArangoDB.
# ArangoDB is NOT published to a host port — it is reachable only from the
# other containers as http://arangodb:8529. Its Aardvark admin UI can be
# exposed at aardvark.leksis.eu THROUGH Caddy (double-gated by IP + password);
# see the AARDVARK_* vars below and the Caddyfile. Still no host port.
#
#   cp .env.example .env   # then set ARANGO_ROOT_PASSWORD
#   docker compose up -d --build
#   docker compose exec api npm run db:init   # once, to create collections

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # ":80" = plain HTTP (default). Set to "leksis.eu" once DNS points here
      # and Caddy will obtain a Let's Encrypt cert automatically.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      # Aardvark (ArangoDB admin UI) exposure — all fail-closed by default; see
      # .env.example. ":8529" is an unpublished internal listener (unreachable).
      AARDVARK_ADDRESS: ${AARDVARK_ADDRESS:-:8529}
      # Default allowlist is localhost-only, i.e. nobody, until you set yours.
      AARDVARK_ALLOW_IPS: ${AARDVARK_ALLOW_IPS:-127.0.0.1/32}
      # Bot PDS exposure — fail-closed like Aardvark: ":3000" is an unpublished
      # internal listener. Set PDS_ADDRESS=pds.leksis.eu and
      # PDS_HANDLES_ADDRESS=*.leksis.eu in .env to go live (see .env.example).
      PDS_ADDRESS: ${PDS_ADDRESS:-:3000}
      PDS_HANDLES_ADDRESS: ${PDS_HANDLES_ADDRESS:-:3001}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - arangodb

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      ARANGO_URL: http://arangodb:8529
      ARANGO_DB: ${ARANGO_DB:-leksis}
      ARANGO_USER: root
      ARANGO_PASSWORD: ${ARANGO_ROOT_PASSWORD:?set ARANGO_ROOT_PASSWORD in .env}
      # CORS is handled by Caddy (see Caddyfile), not the API.
    depends_on:
      - arangodb

  # Bot-only AT Proto PDS (pds.leksis.eu). Hosts the accounts of the scraper
  # bots; their eu.leksis.* records reach the AppView the normal way (this PDS
  # announces itself to the Bluesky relay via PDS_CRAWLERS, the relay crawls it,
  # Jetstream re-serves the events to our consumer). Public through Caddy —
  # federation requires it — but account creation is IP-gated in the Caddyfile.
  pds:
    image: ghcr.io/bluesky-social/pds:0.4
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PDS_HOSTNAME: ${PDS_HOSTNAME:-pds.leksis.eu}
      # Bot handles live directly under leksis.eu (e.g. wikbot.leksis.eu),
      # covered by the existing *.leksis.eu DNS wildcard.
      PDS_SERVICE_HANDLE_DOMAINS: ${PDS_SERVICE_HANDLE_DOMAINS:-.leksis.eu}
      # Secrets — generation commands in .env.example.
      PDS_JWT_SECRET: ${PDS_JWT_SECRET:?set PDS_JWT_SECRET in .env}
      PDS_ADMIN_PASSWORD: ${PDS_ADMIN_PASSWORD:?set PDS_ADMIN_PASSWORD in .env}
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${PDS_PLC_ROTATION_KEY:?set PDS_PLC_ROTATION_KEY in .env}
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
      PDS_DID_PLC_URL: https://plc.directory
      # Announce to the Bluesky relay so records flow into Jetstream.
      PDS_CRAWLERS: https://bsky.network
      # Open signup at the PDS level; the createAccount endpoint is restricted
      # to AARDVARK_ALLOW_IPS at the Caddy edge instead (see Caddyfile).
      PDS_INVITE_REQUIRED: "false"
      LOG_ENABLED: "true"
    volumes:
      - pds_data:/pds

  arangodb:
    image: arangodb/arangodb:3.12
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:?set ARANGO_ROOT_PASSWORD in .env}
    volumes:
      - arango_data:/var/lib/arangodb3

volumes:
  caddy_data:
  caddy_config:
  arango_data:
  pds_data:
